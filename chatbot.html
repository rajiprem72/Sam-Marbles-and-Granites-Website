<!DOCTYPE html>
<html>

<head>

  <base target="_top">

  <style>

    body {

      margin: 0;
      padding: 10px;

      font-family: Arial, sans-serif;

      background: #f5f5f5;

    }

    #chat-messages {

      height: 300px;

      overflow-y: auto;

      background: white;

      border: 1px solid #ccc;

      padding: 10px;

      border-radius: 8px;

    }

    input {

      width: 75%;

      padding: 10px;

      margin-top: 10px;

    }

    button {

      padding: 10px;

    }

  </style>

</head>

<body>

  <div id="chat-messages"></div>

  <input
    id="chat-input"
    placeholder="Ask about marbles..."
  >

  <button onclick="sendMessage()">
    Send
  </button>

  <script>

    async function sendMessage() {

      const input =
        document.getElementById(
          "chat-input"
        );

      const message =
        input.value.trim();

      if (!message) return;

      document
        .getElementById(
          "chat-messages"
        )
        .innerHTML +=
        `<p><b>You:</b> ${message}</p>`;

      google.script.run
        .withSuccessHandler(

          function(reply) {

            document
              .getElementById(
                "chat-messages"
              )
              .innerHTML +=
              `<p><b>AI:</b> ${reply}</p>`;

          }

        )
        .askGemini(message);

      input.value = "";

    }

  </script>

</body>

</html>
